<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PersiMart</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f4ee;
      color: #1d1d1d;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 22px;
      background: #7a2e2e;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }

    .card {
      margin-top: 30px;
      padding: 24px;
      background: white;
      border-radius: 16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>PersiMart</h1>

    <p>
      Hard-to-find cultural products for Canadians and immigrant communities.
    </p>

    <a class="button" href="mailto:info@persimart.ca?subject=Product Request">
      Request a Product
    </a>

    <div class="card">
      <h2>Can't find it in Canada?</h2>
      <p>
        Send us the product name or photo. We will validate demand and explore sourcing options.
      </p>
    </div>
  </div>
</body>
</html>
